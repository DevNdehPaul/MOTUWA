<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Your Ride | MOTUWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-blue-50 via-purple-50 to-pink-50 font-sans">

    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-900 to-blue-600 py-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="/" class="text-white font-bold text-lg">MOTUWA</a>
            <div class="space-x-4">
                <a href="/" class="text-white hover:text-yellow-300">Home</a>
                <a href="/features" class="text-white hover:text-yellow-300">Features</a>
                <a href="/contact" class="text-white hover:text-yellow-300">Contact</a>
                {% if 'user_id' in session %}
                <a href="/logout" class="text-white border px-3 py-1 rounded hover:bg-white hover:text-blue-800 transition">Logout</a>
                {% else %}
                <a href="/login" class="text-white border px-3 py-1 rounded hover:bg-white hover:text-blue-800 transition">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Form -->
    <div class="container mx-auto px-4 py-10">
        <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl p-8 border border-gray-200">
            <h1 class="text-3xl font-bold text-blue-900 mb-4">Capture Your Ride</h1>
            <p class="text-gray-600 mb-6">
                Quickly log your ride details so MOTUWA can alert your emergency contacts if something feels unsafe.
            </p>

            <form method="POST" action="/features" class="space-y-6">
                <!-- Taxi info -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Taxi Plate Number</label>
                        <input type="text" name="plate_number" placeholder="e.g. KAK 204D"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Taxi / Bus Type</label>
                        <input type="text" name="vehicle_type" placeholder="e.g. Yellow taxi"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Driver Name</label>
                        <input type="text" name="driver_name" placeholder="As shown on license or badge"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Driver ID / License</label>
                        <input type="text" name="driver_id" placeholder="License number or PSID"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Pickup / Destination -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">From</label>
                        <input type="text" name="pickup_text" placeholder="Pickup location"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">To</label>
                        <input type="text" name="dest_text" placeholder="Destination"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Unsafe Notes -->
                <div>
                    <label class="block text-sm font-semibold mb-1">Unsafe notes (optional)</label>
                    <textarea name="unsafe_notes" rows="3" placeholder="Describe behavior, route changes, or anything worrying"
                        class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-red-500"></textarea>
                </div>

                <!-- Emergency contact -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Emergency Contact Name</label>
                        <input type="text" name="emergency_name" placeholder="e.g. Mom"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Emergency Contact Email</label>
                        <input type="email" name="emergency_email" placeholder="e.g. mom@example.com"
                            class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                </div>

                <!-- Submit button -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    Submit & Start Monitoring
                </button>
            </form>
        </div>
    </div>
</body>

</html>
